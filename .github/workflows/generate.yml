name: Knowledge Graph Generator

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Knowledge Graph Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_pipeline.py

      - name: Commit and push data
        run: |
          git config --global user.name "KnowledgeMaster Bot"
          git config --global user.email "bot@knowledgemaster.io"
          git add data/ logs/
          git diff --staged --quiet || git commit -m "🧠 Auto-generated knowledge graph [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
